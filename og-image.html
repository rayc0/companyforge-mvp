<!doctype html><html><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"SF Pro Display","Segoe UI",system-ui,sans-serif}
body{width:1200px;height:630px;background:linear-gradient(135deg,#0f0f1e 0%,#1a1a2e 50%,#232340 100%);color:#f1f5f9;display:flex;flex-direction:column;justify-content:center;padding:80px;position:relative;overflow:hidden}
.glow1{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.3) 0%,transparent 60%);top:-200px;right:-200px}
.glow2{position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.25) 0%,transparent 60%);bottom:-150px;left:-150px}
.brand{display:flex;align-items:center;gap:24px;margin-bottom:40px;position:relative;z-index:2}
.logo{width:84px;height:84px;border-radius:18px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:48px;box-shadow:0 20px 50px rgba(99,102,241,.4)}
.name{font-size:64px;font-weight:700;letter-spacing:-.02em}
.tag{color:#94a3b8;font-size:22px;margin-top:4px;font-weight:400}
h1{font-size:72px;font-weight:700;line-height:1.05;letter-spacing:-.03em;margin-bottom:30px;position:relative;z-index:2}
.gradient{background:linear-gradient(135deg,#a5b4fc 0%,#c4b5fd 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
.stats{display:flex;gap:40px;margin-top:auto;position:relative;z-index:2}
.stat{border-left:3px solid #6366f1;padding-left:20px}
.stat-num{font-size:40px;font-weight:700;color:#f1f5f9}
.stat-label{font-size:16px;color:#94a3b8;margin-top:2px}
.url{position:absolute;bottom:50px;right:80px;color:#64748b;font-size:20px;font-weight:500;z-index:2}
</style></head><body>
<div class="glow1"></div><div class="glow2"></div>
<div class="brand">
  <div class="logo">⚒</div>
  <div><div class="name">CompanyForge</div><div class="tag">autonomous operations platform</div></div>
</div>
<h1>Run <span class="gradient">8 companies</span><br>with <span class="gradient">0 employees</span>.</h1>
<div class="stats">
  <div class="stat"><div class="stat-num">130 hrs/wk</div><div class="stat-label">labor displaced</div></div>
  <div class="stat"><div class="stat-num">HKD 300K</div><div class="stat-label">saved monthly</div></div>
  <div class="stat"><div class="stat-num">Bands A-D</div><div class="stat-label">approval gates</div></div>
</div>
<div class="url">companyforge-mvp.pages.dev</div>
</body></html>
